name: Sync frontend deploy branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: Build and push frontend branch
        run: |
          chmod +x scripts/build-frontend-deploy-branch.sh
          ./scripts/build-frontend-deploy-branch.sh
          git push -f origin frontend
